<div class="shell">
  <header class="site-header">
    <div class="utility-bar">
      <div class="brand-lockup">
        <img
          class="brand-logo"
          src="assets/images/logo.png"
          alt="IQAR Real Estate logo"
        />
      </div>

      <div class="shell-actions">
        <button
          type="button"
          class="shell-toggle lang-toggle"
          (click)="ui.toggleLanguage()"
          [attr.aria-label]="ui.language() === 'en' ? 'Switch to Arabic' : 'Switch to English'"
        >
          <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 21a9 9 0 1 0 0-18m0 18a9 9 0 1 1 0-18m0 18c2.2 0 4-4 4-9s-1.8-9-4-9m0 18c-2.2 0-4-4-4-9s1.8-9 4-9M3.6 9h16.8M3.6 15h16.8"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="lang-label">{{ ui.language() === 'en' ? 'AR' : 'EN' }}</span>
        </button>
      </div>

      <nav class="utility-nav" [attr.aria-label]="'shell.brandSubtitle' | translate">
        <a
          routerLink="/properties"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ 'shell.properties' | translate }}
        </a>
        <a
          routerLink="/customers"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ 'shell.customers' | translate }}
        </a>
        <a
          routerLink="/owners"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ 'shell.owners' | translate }}
        </a>
        <a
          routerLink="/requests"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ 'shell.requests' | translate }}
        </a>
      </nav>
    </div>
  </header>

  <main class="content-frame">
    <router-outlet></router-outlet>
  </main>
</div>
