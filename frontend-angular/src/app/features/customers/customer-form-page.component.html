<section class="panel">
  <div class="eyebrow">{{ 'customers.eyebrow' | translate }}</div>
  <h2>{{ (mode === 'create' ? 'customerForm.addTitle' : 'customerForm.editTitle') | translate }}</h2>
  <p class="muted">{{ 'customerForm.subtitle' | translate }}</p>

  <div *ngIf="error" class="error-box">{{ error }}</div>

  <div *ngIf="loading && mode === 'edit'" class="skeleton-stack">
    <div class="form-grid">
      <div class="skeleton skeleton-field" *ngFor="let item of [1, 2, 3]"></div>
    </div>
    <div class="skeleton skeleton-field"></div>
  </div>

  <form *ngIf="!loading || mode === 'create'" [formGroup]="form" (ngSubmit)="submit()" class="stack">
    <div class="form-grid">
      <div><label class="label">{{ 'fields.name' | translate }}</label><input formControlName="name"></div>
      <div><label class="label">{{ 'fields.phone' | translate }}</label><input formControlName="phone"></div>
      <div><label class="label">{{ 'fields.altPhone' | translate }}</label><input formControlName="altPhone"></div>
    </div>
    <div><label class="label">{{ 'fields.notes' | translate }}</label><textarea formControlName="notes"></textarea></div>
    <div class="toolbar">
      <button type="submit" class="btn" [disabled]="loading">{{ loading ? ('common.saving' | translate) : ((mode === 'create' ? 'customerForm.createButton' : 'common.saveChanges') | translate) }}</button>
    </div>
  </form>
</section>
