<section class="panel">
  <div class="eyebrow">{{ 'owners.eyebrow' | translate }}</div>
  <h2>{{ (mode === 'create' ? 'ownerForm.addTitle' : 'ownerForm.editTitle') | translate }}</h2>

  <div *ngIf="error" class="error-box">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="stack">
    <div class="form-grid">
      <div><label class="label">{{ 'fields.name' | translate }}</label><input formControlName="name" /></div>
      <div><label class="label">{{ 'fields.phone' | translate }}</label><input formControlName="phone" /></div>
      <div><label class="label">{{ 'fields.altPhone' | translate }}</label><input formControlName="altPhone" /></div>
    </div>

    <div><label class="label">{{ 'fields.notes' | translate }}</label><textarea formControlName="notes"></textarea></div>

    <div formArrayName="documents" class="stack">
      <div class="toolbar">
        <h3>{{ 'owners.documents' | translate }}</h3>
        <button type="button" class="btn-secondary" (click)="addDocument()">{{ 'ownerForm.addDocument' | translate }}</button>
      </div>

      <div class="form-grid" *ngFor="let group of documents.controls; index as i" [formGroupName]="i">
        <div><label class="label">{{ 'fields.documentName' | translate }}</label><input formControlName="name" /></div>
        <div><label class="label">{{ 'fields.documentUrl' | translate }}</label><input formControlName="url" /></div>
        <div><button type="button" class="btn-danger" (click)="removeDocument(i)">{{ 'common.remove' | translate }}</button></div>
      </div>
    </div>

    <div class="toolbar">
      <button type="submit" class="btn" [disabled]="loading">
        {{ loading ? ('common.saving' | translate) : ((mode === 'create' ? 'ownerForm.createButton' : 'common.saveChanges') | translate) }}
      </button>
    </div>
  </form>
</section>
