<section class="panel">
  <div class="eyebrow">{{ 'requests.eyebrow' | translate }}</div>
  <h2>{{ (mode === 'create' ? 'requestForm.addTitle' : 'requestForm.editTitle') | translate }}</h2>
  <p class="muted">{{ 'requestForm.subtitle' | translate }}</p>

  <div *ngIf="error" class="error-box">{{ error }}</div>

  <div *ngIf="loading && mode === 'edit'" class="skeleton-stack">
    <div class="form-grid">
      <div class="skeleton skeleton-field" *ngFor="let item of [1, 2, 3, 4, 5, 6, 7, 8]"></div>
    </div>
    <div class="skeleton skeleton-field"></div>
    <div class="skeleton skeleton-field"></div>
  </div>

  <form *ngIf="!loading || mode === 'create'" [formGroup]="form" (ngSubmit)="submit()" class="stack">
    <div class="form-grid">
      <div>
        <label class="label">{{ 'fields.customer' | translate }}</label>
        <app-ui-dropdown formControlName="customerId" [options]="customerOptions" />
      </div>
      <div><label class="label">{{ 'fields.type' | translate }}</label><app-ui-dropdown formControlName="requestType" [options]="typeOptions" /></div>
      <div><label class="label">{{ 'fields.purpose' | translate }}</label><app-ui-dropdown formControlName="purpose" [options]="purposeOptions" /></div>
      <div><label class="label">{{ 'fields.minPrice' | translate }}</label><input type="number" formControlName="minPrice"></div>
      <div><label class="label">{{ 'fields.maxPrice' | translate }}</label><input type="number" formControlName="maxPrice"></div>
      <div><label class="label">{{ 'fields.minBedrooms' | translate }}</label><input type="number" formControlName="minBedrooms"></div>
      <div><label class="label">{{ 'fields.minBathrooms' | translate }}</label><input type="number" formControlName="minBathrooms"></div>
      <div><label class="label">{{ 'fields.minAreaSqm' | translate }}</label><input type="number" formControlName="minAreaSqm"></div>
    </div>

    <div formArrayName="preferredLocations" class="stack">
      <div class="toolbar">
        <label class="label">{{ 'fields.preferredLocations' | translate }}</label>
        <button type="button" class="btn-ghost" (click)="addLocation()">{{ 'requestForm.addLocation' | translate }}</button>
      </div>
      <div class="form-grid" *ngFor="let group of preferredLocations.controls; index as i" [formGroupName]="i">
        <div><label class="label">{{ 'fields.city' | translate }}</label><input formControlName="city"></div>
        <div><label class="label">{{ 'fields.area' | translate }}</label><input formControlName="area"></div>
        <div>
          <button type="button" class="btn-danger" (click)="removeLocation(i)">{{ 'common.remove' | translate }}</button>
        </div>
      </div>
    </div>

    <div><label class="label">{{ 'fields.requiredAmenitiesCsv' | translate }}</label><input formControlName="mustHaveAmenitiesText"></div>
    <div class="checkbox-grid">
      <label class="checkbox-item" *ngFor="let amenity of commonAmenities">
        <input type="checkbox" [checked]="hasAmenity(amenity)" (change)="toggleAmenity(amenity, $any($event.target).checked)">
        <span>{{ 'amenities.' + amenity | translate }}</span>
      </label>
    </div>

    <div><label class="label">{{ 'fields.notes' | translate }}</label><textarea formControlName="notes"></textarea></div>

    <div class="toolbar">
      <button type="submit" class="btn" [disabled]="loading">{{ loading ? ('common.saving' | translate) : ((mode === 'create' ? 'requestForm.createButton' : 'common.saveChanges') | translate) }}</button>
    </div>
  </form>
</section>
